<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>FamPilot — API connected demo</title>
<style>
  body{font-family:Inter,system-ui,sans-serif;max-width:560px;margin:0 auto;padding:18px;background:#FAF7F2;color:#272233}
  h1{font-size:20px}h2{font-size:14px;text-transform:uppercase;letter-spacing:.05em;color:#8A8398;margin:18px 0 6px}
  input,button{font:inherit;border-radius:10px;padding:9px 11px;border:1px solid #ECE7E0}
  input{width:100%;margin:4px 0;background:#fff}
  button{background:#6C5CE7;color:#fff;border:none;cursor:pointer;font-weight:600}
  button.ghost{background:#fff;color:#272233;border:1px solid #ECE7E0}
  .row{display:flex;gap:8px}.row>*{flex:1}
  pre{background:#fff;border:1px solid #ECE7E0;border-radius:10px;padding:10px;font-size:12px;white-space:pre-wrap;max-height:240px;overflow:auto}
  .card{background:#fff;border:1px solid #ECE7E0;border-radius:14px;padding:14px;margin-bottom:12px}
</style>
<h1>FamPilot — API connected demo</h1>
<p style="color:#8A8398;font-size:13px">Bu sayfa gerçek API'ye bağlanır. Backend'i çalıştırın, sonra base URL'i girip deneyin.</p>

<div class="card">
  <h2>1 · API base</h2>
  <input id="base" value="http://localhost:3000/api/v1">
</div>

<div class="card">
  <h2>2 · Hesap</h2>
  <div class="row"><input id="email" placeholder="email" value="demo@fam.com"><input id="pw" placeholder="password" value="secret1"></div>
  <input id="famname" placeholder="Aile adı (signup için)" value="Demo ailesi">
  <div class="row"><button onclick="doSignup()">Signup</button><button class="ghost" onclick="doLogin()">Login</button></div>
</div>

<div class="card">
  <h2>3 · Etkinlikler & yakalama</h2>
  <input id="capture" placeholder='"Deniz has a dentist appointment Tuesday 3pm"'>
  <div class="row"><button onclick="doCapture()">AI capture → taslak</button><button class="ghost" onclick="loadEvents()">Etkinlikleri yükle</button></div>
</div>

<div class="card">
  <h2>4 · Gmail bağlayıcı</h2>
  <div class="row"><button onclick="connectGmail()">Gmail bağla</button><button class="ghost" onclick="syncGmail()">Şimdi senkronize et</button></div>
</div>

<h2>Çıktı</h2>
<pre id="out">—</pre>

<script type="module">
import { FamPilotAPI } from '../client/api-client.js';
let api = new FamPilotAPI(document.getElementById('base').value);
const out = (x) => document.getElementById('out').textContent = typeof x === 'string' ? x : JSON.stringify(x, null, 2);
const rebase = () => { api = new FamPilotAPI(document.getElementById('base').value); api.token = window.__tok; api.refreshToken = window.__rt; };
const save = (r) => { window.__tok = r.accessToken; window.__rt = r.refreshToken; };

window.doSignup = async () => { try { rebase(); const r = await api.signup({ familyName: famname.value, name: 'Demo', email: email.value, password: pw.value, timezone: Intl.DateTimeFormat().resolvedOptions().timeZone }); save(r); out(r); } catch (e) { out('ERROR: ' + e.message); } };
window.doLogin = async () => { try { rebase(); const r = await api.login({ email: email.value, password: pw.value }); save(r); out(r); } catch (e) { out('ERROR: ' + e.message); } };
window.doCapture = async () => { try { rebase(); const d = await api.aiCapture(capture.value); out(d); } catch (e) { out('ERROR: ' + e.message); } };
window.loadEvents = async () => { try { rebase(); const ev = await api.listEvents(); out(ev); } catch (e) { out('ERROR: ' + e.message); } };
window.connectGmail = async () => { try { rebase(); const { url } = await api.gmailAuthUrl(); window.open(url, '_blank'); out('Gmail consent açıldı. İzin verdikten sonra "Şimdi senkronize et"e basın.'); } catch (e) { out('ERROR: ' + e.message); } };
window.syncGmail = async () => { try { rebase(); const r = await api.gmailSync(); out(r); } catch (e) { out('ERROR: ' + e.message); } };
</script>
